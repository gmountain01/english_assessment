<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 07 — 메타인지 보정 · 인지부하 · 바람직한 어려움으로 읽는 생성형 AI</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#f4f5f7;color:#1a1a2e;display:flex;flex-direction:column;height:100vh}
  header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
  header h1{font-size:16px;font-weight:600;letter-spacing:-.3px}
  header .badge{background:#6c5ce7;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700}
  header a{color:#a29bfe;text-decoration:none;font-size:13px;margin-left:auto}
  header a:hover{text-decoration:underline}
  .viewer{flex:1;display:flex;justify-content:center;align-items:stretch;padding:0}
  .viewer iframe,.viewer embed,.viewer object{width:100%;height:100%;border:none}
  .fallback{display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center}
  .fallback .icon{font-size:48px}
  .fallback p{font-size:15px;color:#555;max-width:480px;line-height:1.6}
  .fallback a.btn{display:inline-block;background:#6c5ce7;color:#fff;padding:12px 28px;border-radius:6px;text-decoration:none;font-weight:600;font-size:14px}
  .fallback a.btn:hover{background:#5a4bd1}
</style>
</head>
<body>
  <header>
    <span class="badge">Stage 07</span>
    <h1>(최종) 3조 — 메타인지 보정 · 인지부하 · 바람직한 어려움으로 읽는 생성형 AI</h1>
    <a href="index.html">← 평가 시스템으로 돌아가기</a>
  </header>

  <div class="viewer" id="viewer">
    <iframe src="stage07.pdf" type="application/pdf" id="pdf-frame"></iframe>
  </div>

  <div class="fallback" id="fallback">
    <div class="icon">📄</div>
    <p><b>PDF 뷰어를 지원하지 않는 브라우저입니다.</b><br>아래 버튼을 눌러 PDF를 직접 다운로드하세요.</p>
    <a class="btn" href="stage07.pdf" download>PDF 다운로드</a>
  </div>

  <script>
    const frame = document.getElementById('pdf-frame');
    frame.onerror = function() {
      document.getElementById('viewer').style.display = 'none';
      document.getElementById('fallback').style.display = 'flex';
    };
    // iOS Safari 등 iframe PDF 미지원 시 fallback
    setTimeout(function() {
      try {
        if (frame.contentDocument && frame.contentDocument.body &&
            frame.contentDocument.body.children.length === 0) {
          document.getElementById('viewer').style.display = 'none';
          document.getElementById('fallback').style.display = 'flex';
        }
      } catch(e) { /* cross-origin, PDF loaded fine */ }
    }, 2000);
  </script>
</body>
</html>
